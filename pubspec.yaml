name: darkpost
description: Offline encrypted P2P messenger — no internet, no SIM.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Encryption
  encrypt: ^5.0.3
  pointycastle: ^3.7.3
  crypto: ^3.0.3
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  
  # Utils
  uuid: ^4.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  nearby_connections: ^4.3.0
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: ShareTechMono
      fonts:
        - asset: assets/fonts/ShareTechMono-Regular.ttf
  assets:
    - assets/fonts/
